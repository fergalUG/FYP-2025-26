name: Velometry CI/CD Pipeline
on:
  pull_request:
    branches: ["**"]

jobs:
  test_lint_format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format Check
        run: npx prettier --check .

      - name: Lint Check
        run: npm run lint

      - name: Run Tests
        run: npm test
